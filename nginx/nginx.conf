upstream api_servers {
    least_conn;
    server host.docker.internal:4000;
    # Add more instances for horizontal scaling:
    # server host.docker.internal:4001;
    # server host.docker.internal:4002;
}

upstream web_servers {
    least_conn;
    server host.docker.internal:3000;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=click:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # Client body limits
    client_max_body_size 5m;

    # ── API: Auth strict routes ──
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=auth_strict burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API: Click tracking ──
    location ~ ^/api/pages/.+/links/.+/click$ {
        limit_req zone=click burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API: Webhooks (no rate limit) ──
    location /api/webhooks/ {
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API: All other routes ──
    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        limit_req_status 429;

        # Strip /api prefix before proxying
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── MinIO public assets (avatars) ──
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
        proxy_hide_header X-Amz-Request-Id;

        # Cache static assets
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Frontend ──
    location / {
        proxy_pass http://web_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Custom error pages for rate limiting
    error_page 429 @too_many_requests;
    location @too_many_requests {
        default_type application/json;
        return 429 '{"statusCode":429,"message":"Too Many Requests"}';
    }
}
