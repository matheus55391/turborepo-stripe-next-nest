name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.32.1"

jobs:
  # ──────────────────────────────────────────────
  # 1. Install dependencies (cached for all jobs)
  # ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

  # ──────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ──────────────────────────────────────────────
  # 3. Type-check
  # ──────────────────────────────────────────────
  type-check:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm run check-types

  # ──────────────────────────────────────────────
  # 4. Unit tests — API
  # ──────────────────────────────────────────────
  test-api:
    name: "Test: API"
    needs: install
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://app:app@localhost:5432/app?schema=public"
      JWT_SECRET: "ci-test-secret"
      STRIPE_SECRET_KEY: "sk_test_fake"
      STRIPE_WEBHOOK_SECRET: "whsec_fake"
      STRIPE_STARTER_PRICE_ID: "price_fake"
      PORT: "4000"
      FRONTEND_ORIGIN: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Run API tests
        run: pnpm --filter api test -- --ci --coverage

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 5. Unit tests — Web
  # ──────────────────────────────────────────────
  test-web:
    name: "Test: Web"
    needs: install
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm --filter web test -- --ci --coverage

      - name: Upload Web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 6. Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, type-check, test-api, test-web]
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://app:app@localhost:5432/app?schema=public"
      JWT_SECRET: "ci-build-secret"
      STRIPE_SECRET_KEY: "sk_test_fake"
      STRIPE_WEBHOOK_SECRET: "whsec_fake"
      STRIPE_STARTER_PRICE_ID: "price_fake"
      PORT: "4000"
      FRONTEND_ORIGIN: "http://localhost:3000"
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
